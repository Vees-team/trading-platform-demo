<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0;background:#0b0f1a;color:#ffffff;font-family:Arial;">

  <div style="padding:40px 20px;max-width:420px;margin:auto;">

    <h2>Welcome Back</h2>
    <p style="opacity:0.8;">
      Sign in to continue to your account.
    </p>

    <form onsubmit="login(); return false;" style="margin-top:25px;">

      <label>Email Address</label><br>
      <input type="email" required
        style="width:100%;padding:12px;margin-bottom:15px;border-radius:6px;border:none;">

      <label>Password</label><br>
      <input type="password" required
        style="width:100%;padding:12px;margin-bottom:20px;border-radius:6px;border:none;">

      <button type="submit"
        style="width:100%;padding:14px;background:#2563eb;color:#fff;border:none;border-radius:8px;">
        Login
      </button>

    </form>

    <p id="status" style="margin-top:20px;color:#ffcc00;"></p>

    <p style="margin-top:30px;font-size:14px;opacity:0.7;">
      Don’t have an account?
      <a href="signup.html" style="color:#3b82f6;text-decoration:none;">
        Create one
      </a>
    </p>

  </div>

  <script>
    function login() {
      document.getElementById("status").innerText =
        "Checking account status...";

      // DEMO LOGIC: all users are unverified first
      setTimeout(() => {
        window.location.href = "pending.html";
      }, 1500);
    }
  </script>

</body>
</html>
